resources:
  jobs:
    housing_medallion_job:
      name: housing-medallion-pipeline
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ../notebooks/00_setup.sql

        - task_key: extract_zip
          depends_on:
            - task_key: setup
          notebook_task:
            notebook_path: ../notebooks/00_extract_zip.py

        - task_key: bronze
          depends_on:
            - task_key: extract_zip
          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingest.py

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../notebooks/02_silver_transform.py

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../notebooks/03_gold_aggregate.py